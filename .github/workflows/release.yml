name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$VERSION" ]; then
            echo "VERSION is empty" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release tag
        id: existing
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists. Skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes
        if: steps.existing.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v version="$VERSION" '
            /^## / {
              if (found) exit
              if ($0 ~ "^## " version "([ -]|$)") {
                found = 1
                next
              }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Release $VERSION" > release_notes.md
          fi

      - name: Build release archive
        if: steps.existing.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PACKAGE_DIR="dist/comment-block-skill"
          mkdir -p "$PACKAGE_DIR"
          cp -R skill README.md LICENSE CHANGELOG.md VERSION docs examples "$PACKAGE_DIR/"
          (cd dist && zip -r "comment-block-skill-$TAG.zip" comment-block-skill)

      - name: Create tag
        if: steps.existing.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md \
            --latest \
            "dist/comment-block-skill-$TAG.zip"
